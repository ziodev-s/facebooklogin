<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        body {
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .left-panel {
            text-align: center;
            margin-bottom: 40px;
        }
        .left-panel h1 {
            color: #1877f2;
            font-size: 58px;
            margin: -20px;
            font-weight: bold;
        }
        .left-panel h2 {
            color: #1c1e21;
            font-size: 28px;
            font-weight: normal;
            line-height: 32px;
            width: 500px;
        }
        .right-panel {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
            padding: 20px;
            width: 396px;
            text-align: center;
        }
        .right-panel input[type="text"],
        .right-panel input[type="password"] {
            width: calc(100% - 20px);
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
        }
        .right-panel button {
            width: 100%;
            padding: 14px 16px;
            background-color: #1877f2;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .right-panel button:hover {
            background-color: #166fe5;
        }
        .right-panel a {
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
            margin-top: 16px;
            display: block;
        }
        .right-panel a:hover {
            text-decoration: underline;
        }
        .divider {
            border-bottom: 1px solid #dadde1;
            margin: 20px 0;
        }
        .create-account {
            width: auto;
            padding: 12px 16px;
            background-color: #42b72a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 auto;
            display: inline-block;
        }
        .create-account:hover {
            background-color: #36a420;
        }
        .footer-links {
            margin-top: 28px;
            font-size: 13px;
            color: #606770;
        }
        .footer-links a {
            color: #606770;
            margin: 0 4px;
        }
        #error-message {
            color: #fa3e3e;
            font-size: 15px;
            margin-bottom: 15px;
            display: none; /* Hidden by default */
            border: 1px solid #fa3e3e;
            background-color: #ffebe8;
            padding: 10px;
            border-radius: 6px;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .left-panel {
                margin-bottom: 20px;
            }
            .left-panel h2 {
                width: auto;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>facebook</h1>
            <h2>Connect with friends and the world around you on Facebook.</h2>
        </div>
        <div class="right-panel">
            <div id="error-message"></div> <!-- Error message div -->
            <form id="login-form">
                <input type="text" name="email" id="email" placeholder="Email or phone number" required>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <button type="submit">Log In</button>
                <a href="#">Forgot password?</a>
                <div class="divider"></div>
                <button type="button" class="create-account">Create new account</button>
            </form>
            <div class="footer-links">
                <p><a href="#">Create a Page</a> for a celebrity, band or business.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Stop the form from submitting normally

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessageDiv = document.getElementById('error-message');

            // Ini cuma simulasi ya, bro! Realnya harus divalidasi di server
            if (email === 'test@example.com' && password === 'correctpassword') {
                errorMessageDiv.style.display = 'none';
                errorMessageDiv.textContent = '';
                // Kalo bener, bisa redirect ke halaman sukses
                alert('Login Berhasil! 😎');
                // window.location.href = 'https://www.facebook.com'; // Contoh redirect
            } else {
                errorMessageDiv.textContent = 'Email atau kata sandi yang Anda masukkan salah. Coba lagi.';
                errorMessageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
